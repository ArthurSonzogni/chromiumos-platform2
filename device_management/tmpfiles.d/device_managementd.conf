d= /var/lib/device_management 0755 device_management device_management
Z= /var/lib/device_management - device_management device_management

# Setup the paths expected by lockbox-cache.
# Owned by root with the sticky bit so the sandboxed device_management uid
# (which has group-write for OOBE Finalize()) cannot unlink or rename-over the
# root-owned, TPM-verified install_attributes.pb written by lockbox-cache.
d= /run/lockbox 01775 root device_management
